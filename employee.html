<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burger Shot — Espace Employé</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red:#CC1A1A; --red-glow:#FF2222; --gold:#F5A623; --gold-light:#FFD166;
    --black:#0A0A0A; --dark:#111111; --dark2:#1A1A1A; --dark3:#222222; --dark4:#2A2A2A;
    --white:#F5F0E8; --green:#22c55e; --red-err:#ef4444; --blue:#4f7af8; --purple:#a855f7;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Barlow',sans-serif;background:var(--black);color:var(--white);min-height:100vh;overflow-x:hidden}

  .fire-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .ember{position:absolute;bottom:-10px;border-radius:50%;animation:rise linear infinite}
  @keyframes rise{0%{transform:translateY(0) scale(1);opacity:.8}100%{transform:translateY(-95vh) scale(0);opacity:0}}

  /* NAV */
  nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:68px;background:linear-gradient(180deg,rgba(0,0,0,.97),rgba(0,0,0,.8));backdrop-filter:blur(16px);border-bottom:1px solid rgba(204,26,26,.3)}
  .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--white)}
  .nav-logo-icon{width:40px;height:40px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;animation:pulseLogo 2.5s infinite}
  @keyframes pulseLogo{0%,100%{box-shadow:0 0 14px rgba(204,26,26,.6)}50%{box-shadow:0 0 26px rgba(255,34,34,.9)}}
  .nav-logo span{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px}
  .nav-logo span em{color:var(--red)}
  .nav-badge{background:rgba(204,26,26,.2);border:1px solid rgba(204,26,26,.4);color:var(--red);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;padding:4px 10px;border-radius:4px;text-transform:uppercase}
  .nav-right{display:flex;align-items:center;gap:12px}
  .nav-user{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1px;color:rgba(255,255,255,.4)}
  .nav-user strong{color:var(--gold)}
  .nav-btn-sm{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1px;color:rgba(255,255,255,.4);padding:6px 14px;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:transparent;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
  .nav-btn-sm:hover{border-color:var(--gold);color:var(--gold)}

  /* SIDEBAR */
  .sidebar{position:fixed;top:68px;left:0;width:260px;height:calc(100vh - 68px);background:var(--dark);border-right:1px solid rgba(255,255,255,.06);padding:24px 16px;z-index:100;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
  .sidebar-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.2);margin:8px 0 4px 8px}
  .sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;transition:all .2s;font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:.5px;color:rgba(255,255,255,.5);border:1px solid transparent}
  .sidebar-item:hover{background:rgba(255,255,255,.05);color:var(--white)}
  .sidebar-item.active{background:rgba(204,26,26,.15);border-color:rgba(204,26,26,.3);color:var(--white)}
  .sidebar-count{margin-left:auto;background:var(--red);color:#fff;font-size:11px;font-family:'Bebas Neue',sans-serif;padding:2px 8px;border-radius:100px;min-width:22px;text-align:center}
  .sidebar-count.gold{background:var(--gold);color:var(--black)}

  /* MAIN */
  .main-content{margin-left:260px;padding:100px 28px 60px;position:relative;z-index:2}
  .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,5vw,52px);letter-spacing:3px}
  .page-title em{color:var(--red)}
  .refresh-btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4);padding:8px 16px;border:1px solid rgba(255,255,255,.1);border-radius:6px;background:transparent;cursor:pointer;transition:all .2s}
  .refresh-btn:hover{border-color:var(--gold);color:var(--gold)}

  /* ORDERS GRID */
  .orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
  .order-card{background:var(--dark2);border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden;transition:all .25s;cursor:pointer;position:relative}
  .order-card:hover{border-color:var(--red);transform:translateY(-3px);box-shadow:0 8px 30px rgba(204,26,26,.2)}
  .order-card.has-unread::after{content:'';position:absolute;top:10px;right:10px;width:10px;height:10px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);animation:blink 1.2s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .oc-top-bar{background:rgba(204,26,26,.08);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05)}
  .oc-id{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
  .oc-id span{color:var(--red)}
  .oc-time{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:rgba(255,255,255,.4)}
  .oc-body{padding:16px}
  .oc-customer{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px}
  .oc-delivery{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:rgba(255,255,255,.5);margin-bottom:8px}
  .oc-items-list{font-size:13px;color:rgba(255,255,255,.6)}
  .oc-total{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);text-align:right;margin-top:10px}
  .oc-footer{padding:12px 16px;background:rgba(0,0,0,.2);border-top:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;align-items:center;gap:8px}
  .oc-chat-hint{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;color:rgba(255,255,255,.3)}

  /* STATUS BADGES */
  .status-badge{padding:5px 14px;border-radius:100px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;white-space:nowrap}
  .status-en_attente{background:rgba(245,166,35,.2);color:var(--gold);border:1px solid rgba(245,166,35,.4)}
  .status-acceptee{background:rgba(79,122,248,.2);color:#7da9ff;border:1px solid rgba(79,122,248,.4)}
  .status-preparation{background:rgba(168,85,247,.2);color:#c084fc;border:1px solid rgba(168,85,247,.4)}
  .status-finalisation{background:rgba(245,166,35,.25);color:var(--gold);border:1px solid rgba(245,166,35,.5)}
  .status-livraison{background:rgba(79,122,248,.25);color:#7da9ff;border:1px solid rgba(79,122,248,.5)}
  .status-termine{background:rgba(34,197,94,.2);color:#4ade80;border:1px solid rgba(34,197,94,.4)}
  .status-reglee{background:rgba(255,255,255,.1);color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.15)}
  .status-refusee{background:rgba(239,68,68,.2);color:var(--red-err);border:1px solid rgba(239,68,68,.3)}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--dark2);border:1px solid rgba(204,26,26,.3);border-radius:16px;width:100%;max-width:900px;max-height:94vh;overflow:hidden;display:flex;flex-direction:column}
  .modal-header{padding:20px 28px;background:linear-gradient(135deg,rgba(204,26,26,.15),rgba(245,166,35,.05));display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
  .modal-order-id{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px}
  .modal-order-id span{color:var(--red)}
  .modal-tabs{display:flex;gap:4px;background:rgba(0,0,0,.3);border-radius:8px;padding:4px}
  .modal-tab{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1px;padding:8px 18px;border-radius:6px;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.5);transition:all .2s;position:relative}
  .modal-tab.active{background:var(--red);color:#fff}
  .modal-tab .tab-badge{position:absolute;top:-4px;right:-4px;background:var(--gold);color:#000;width:16px;height:16px;border-radius:50%;font-size:10px;font-family:'Bebas Neue',sans-serif;display:none;align-items:center;justify-content:center}
  .modal-tab .tab-badge.show{display:flex}
  .modal-close{background:rgba(255,255,255,.1);border:none;color:var(--white);width:38px;height:38px;border-radius:50%;font-size:20px;cursor:pointer;transition:background .2s;flex-shrink:0}
  .modal-close:hover{background:var(--red)}

  .modal-scroll{overflow-y:auto;flex:1}
  .tab-content{display:none}
  .tab-content.active{display:block}

  /* DETAILS TAB */
  .modal-body{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .modal-section{background:var(--dark3);padding:18px;border-radius:10px}
  .modal-section.full{grid-column:1/-1}
  .ms-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:10px}
  .ms-info{font-size:14.5px;line-height:1.8}
  .items-table{width:100%;border-collapse:collapse}
  .items-table td{padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07);font-size:14px}
  .items-table td:last-child{text-align:right;font-weight:600;color:var(--gold)}
  .modal-actions{padding:0 24px 24px;display:flex;flex-wrap:wrap;gap:10px}

  /* ACTION BUTTONS */
  .btn{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;padding:11px 22px;border:none;border-radius:8px;cursor:pointer;transition:all .2s}
  .btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
  .btn-accept{background:var(--green);color:#000}
  .btn-refuse{background:rgba(239,68,68,.2);color:var(--red-err);border:1px solid rgba(239,68,68,.4)}
  .btn-prep{background:rgba(168,85,247,.25);color:#c084fc;border:1px solid rgba(168,85,247,.4)}
  .btn-done{background:var(--green);color:#000}
  .btn-paid{background:rgba(245,166,35,.25);color:var(--gold);border:1px solid rgba(245,166,35,.4)}

  /* CHAT TAB */
  .chat-container{display:flex;flex-direction:column;height:460px}
  .chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
  .chat-messages::-webkit-scrollbar{width:4px}
  .chat-messages::-webkit-scrollbar-thumb{background:rgba(204,26,26,.5);border-radius:2px}
  .chat-empty{text-align:center;padding:40px;color:rgba(255,255,255,.3);font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:1px}

  .msg-row{display:flex;gap:10px;align-items:flex-end;max-width:80%}
  .msg-row.from-employee{align-self:flex-end;flex-direction:row-reverse}
  .msg-row.from-client{align-self:flex-start}
  .msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  .from-employee .msg-avatar{background:rgba(204,26,26,.3);border:1px solid rgba(204,26,26,.4)}
  .from-client .msg-avatar{background:rgba(245,166,35,.2);border:1px solid rgba(245,166,35,.3)}
  .msg-bubble{padding:10px 14px;border-radius:14px;max-width:100%;word-break:break-word}
  .from-employee .msg-bubble{background:rgba(204,26,26,.25);border:1px solid rgba(204,26,26,.3);border-bottom-right-radius:4px}
  .from-client .msg-bubble{background:var(--dark3);border:1px solid rgba(255,255,255,.1);border-bottom-left-radius:4px}
  .msg-name{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
  .from-employee .msg-name{color:rgba(204,26,26,.8)}
  .from-client .msg-name{color:rgba(245,166,35,.8)}
  .msg-text{font-size:14px;line-height:1.5;color:var(--white)}
  .msg-time{font-size:10px;color:rgba(255,255,255,.3);margin-top:4px;font-family:'Barlow Condensed',sans-serif}
  .from-employee .msg-time{text-align:right}

  .chat-input-area{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.2);display:flex;gap:10px;align-items:flex-end}
  .chat-input{flex:1;background:var(--dark3);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:11px 14px;color:var(--white);font-family:'Barlow',sans-serif;font-size:14px;outline:none;resize:none;transition:border-color .2s;max-height:100px;min-height:44px}
  .chat-input:focus{border-color:rgba(204,26,26,.5)}
  .chat-input::placeholder{color:rgba(255,255,255,.3)}
  .chat-send-btn{background:var(--red);border:none;color:#fff;width:44px;height:44px;border-radius:10px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
  .chat-send-btn:hover{background:var(--red-glow);transform:scale(1.05)}
  .chat-send-btn:disabled{background:rgba(204,26,26,.3);cursor:not-allowed;transform:none}

  /* TOAST */
  .toast{position:fixed;bottom:30px;right:30px;z-index:999;background:var(--dark3);border:1px solid rgba(34,197,94,.4);color:#4ade80;font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:1px;padding:14px 22px;border-radius:10px;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none}
  .toast.show{transform:translateY(0);opacity:1}
  .toast.error{border-color:rgba(239,68,68,.4);color:var(--red-err)}

  .loading-state,.empty-state{text-align:center;padding:100px;color:rgba(255,255,255,.4);font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:1px}

  @media(max-width:768px){
    .sidebar{display:none}
    .main-content{margin-left:0;padding:88px 14px 40px}
    .modal-body{grid-template-columns:1fr}
    .modal{max-height:100vh;border-radius:0}
  }
</style>
</head>
<body>
<div class="fire-bg" id="fireBg"></div>

<nav>
  <a href="menu.html" class="nav-logo">
    <div class="nav-logo-icon">🍔</div>
    <span>BURGER<em>SHOT</em></span>
  </a>
  <span class="nav-badge" id="roleLabel">EMPLOYÉ</span>
  <div class="nav-right">
    <span class="nav-user">Connecté : <strong id="navUsername">—</strong></span>
    <a href="admin.html" class="nav-btn-sm" id="adminLink" style="display:none">⚙️ Admin</a>
    <button class="nav-btn-sm" onclick="logout()">Déconnexion</button>
  </div>
</nav>

<div class="sidebar">
  <div class="sidebar-title">Navigation</div>
  <div class="sidebar-item active" onclick="showView('active')" id="sideActive">
    🔥 Commandes actives <span class="sidebar-count" id="sideCountActive">0</span>
  </div>
  <div class="sidebar-item" onclick="showView('all')" id="sideAll">
    📋 Toutes les commandes <span class="sidebar-count gold" id="sideCountAll">0</span>
  </div>
</div>

<div class="main-content">
  <div id="view-active">
    <div class="page-header">
      <h1 class="page-title">COMMANDES <em>ACTIVES</em></h1>
      <button class="refresh-btn" onclick="loadAll()">↻ Actualiser</button>
    </div>
    <div id="list-active"><div class="loading-state">Connexion à Supabase...</div></div>
  </div>
  <div id="view-all" style="display:none">
    <div class="page-header">
      <h1 class="page-title">TOUTES LES <em>COMMANDES</em></h1>
      <button class="refresh-btn" onclick="loadAll()">↻ Actualiser</button>
    </div>
    <div id="list-all"><div class="loading-state">Chargement...</div></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-order-id" id="modalOrderId">Commande <span>#0000</span></div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="modal-tabs">
          <button class="modal-tab active" onclick="switchModalTab('details',this)" id="tabBtnDetails">📋 Détails</button>
          <button class="modal-tab" onclick="switchModalTab('chat',this)" id="tabBtnChat">
            💬 Discussion
            <span class="tab-badge" id="chatTabBadge">!</span>
          </button>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
    </div>

    <div class="modal-scroll">
      <div class="tab-content active" id="tab-details">
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-actions" id="modalActions"></div>
      </div>

      <div class="tab-content" id="tab-chat">
        <div class="chat-container">
          <div class="chat-messages" id="chatMessages">
            <div class="chat-empty">Aucun message pour cette commande.</div>
          </div>
          <div class="chat-input-area">
            <textarea class="chat-input" id="chatInput" placeholder="Message au client..." rows="1"
              onkeydown="handleChatKey(event)"
              oninput="autoResize(this)"></textarea>
            <button class="chat-send-btn" id="chatSendBtn" onclick="sendMessage()">➤</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ====================== CONFIG SUPABASE ======================
const SUPABASE_URL    = 'https://gktawbaposndfxijkxdk.supabase.co';
const SUPABASE_KEY    = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrdGF3YmFwb3NuZGZ4aWpreGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQwNzUyNDUsImV4cCI6MjA3OTY1MTI0NX0.tY-CHuyb2zr9s6hlGkwmrdTvg920VVNghI9S45CjwKk';
const SB_HEADERS      = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};
const ORDERS_TABLE    = 'orders_burgershot';
const MESSAGES_TABLE  = 'messages_burgershot';

// ====================== STATE ======================
let currentUser      = null;
let allOrders        = [];
let currentOrder     = null;
let chatPollInterval = null;
let lastMsgIds       = new Set();   // IDs des messages déjà vus pour le badge
let activeModalTab   = 'details';

const STATUS_LABELS = {
  en_attente:'En attente', acceptee:'Acceptée', recue:'Reçue',
  preparation:'En préparation', finalisation:'Finalisation',
  livraison:'En livraison', termine:'Terminée',
  reglee:'Réglée', refusee:'Refusée',
};

// ====================== INIT ======================
async function init() {
  currentUser = JSON.parse(sessionStorage.getItem('bs_user') || 'null');
  if (!currentUser) {
    currentUser = { username: 'Démo', permission: 'employee' };
    showToast('Mode démo — connectez-vous pour les vraies sessions', 'error');
  }
  document.getElementById('navUsername').textContent = currentUser.username || '—';
  document.getElementById('roleLabel').textContent = (currentUser.permission || 'employee').toUpperCase();
  if (['admin','owner','it'].includes(currentUser.permission))
    document.getElementById('adminLink').style.display = 'inline-flex';

  spawnEmbers();
  await loadAll();
  setInterval(loadAll, 12000);
}

// ====================== LOAD ORDERS ======================
async function loadAll() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${ORDERS_TABLE}?select=*&order=created_at.desc`,
      { headers: SB_HEADERS }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allOrders = await res.json();
    renderCurrentView();
  } catch(e) {
    showToast(`Erreur Supabase : ${e.message}`, 'error');
    document.getElementById('list-active').innerHTML =
      `<div class="empty-state">❌ Impossible de charger les commandes<br><small style="opacity:.5;font-size:12px">${e.message}</small></div>`;
  }
}

// ====================== SUPABASE PATCH ======================
async function sbPatch(orderId, payload) {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/${ORDERS_TABLE}?id=eq.${orderId}`,
    { method: 'PATCH', headers: SB_HEADERS, body: JSON.stringify(payload) }
  );
  if (!res.ok) {
    const e = await res.json();
    throw new Error(e.message || `HTTP ${res.status}`);
  }
}

// ====================== MESSAGES ======================
async function loadMessages(orderId) {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${MESSAGES_TABLE}?id_commande=eq.${orderId}&order=created_at.asc&select=*`,
      { headers: SB_HEADERS }
    );
    if (!res.ok) return [];
    return await res.json();
  } catch {
    return [];
  }
}

async function sendMessage() {
  if (!currentOrder) return;
  const input   = document.getElementById('chatInput');
  const content = input.value.trim();
  if (!content) return;

  const btn = document.getElementById('chatSendBtn');
  btn.disabled = true;
  input.value  = '';
  autoResize(input);

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${MESSAGES_TABLE}`,
      {
        method: 'POST',
        headers: { ...SB_HEADERS, 'Prefer': 'return=minimal' },
        body: JSON.stringify({
          id_commande: currentOrder.id,
          username:    currentUser.username || 'Équipe',
          messages:    content,
        })
      }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    await refreshChat(true);
    showToast('Message envoyé');
  } catch(e) {
    showToast(`Erreur : ${e.message}`, 'error');
  }
  btn.disabled = false;
  input.focus();
}

async function refreshChat(scrollBottom = false) {
  if (!currentOrder) return;
  const messages = await loadMessages(currentOrder.id);

  // Badge : détecter nouveaux messages venant du client
  if (activeModalTab === 'details') {
    const clientMsgs = messages.filter(m => m.username !== (currentUser.username));
    const newOnes    = clientMsgs.filter(m => !lastMsgIds.has(m.id));
    if (newOnes.length > 0) {
      document.getElementById('chatTabBadge').classList.add('show');
    }
  }
  messages.forEach(m => lastMsgIds.add(m.id));

  renderMessages(messages, scrollBottom);
}

function renderMessages(messages, scrollBottom = false) {
  const container = document.getElementById('chatMessages');
  if (!messages || messages.length === 0) {
    container.innerHTML = '<div class="chat-empty">💬 Aucun message pour le moment.<br><span style="opacity:.5;font-size:12px">Envoyez un message pour communiquer avec le client.</span></div>';
    return;
  }

  // Côté employé, on considère comme "from-employee" tout message dont le username
  // correspond à un membre du staff (= l'employé connecté ou tout autre que le client).
  // On n'a pas de champ sender_type, donc on compare avec le username du client.
  // Pour simplifier : les messages de l'employé connecté → from-employee, le reste → from-client.
  // Si un autre employé répond, on peut l'afficher aussi en from-employee.
  // Règle : si username === currentUser.username → from-employee, sinon → from-client.
  // (Adapte selon ta logique de gestion des rôles si nécessaire.)

  container.innerHTML = messages.map(m => {
    const isEmployee = m.username === currentUser.username;
    const time = m.created_at
      ? new Date(m.created_at).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' })
      : '';
    const avatar = isEmployee ? '👨‍🍳' : '🙋';
    return `
      <div class="msg-row ${isEmployee ? 'from-employee' : 'from-client'}">
        <div class="msg-avatar">${avatar}</div>
        <div>
          <div class="msg-name">${escHtml(m.username || '?')}</div>
          <div class="msg-bubble">
            <div class="msg-text">${escHtml(m.messages)}</div>
            <div class="msg-time">${time}</div>
          </div>
        </div>
      </div>`;
  }).join('');

  if (scrollBottom) container.scrollTop = container.scrollHeight;
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ====================== RENDER CARDS ======================
function parseItems(items) {
  if (!items) return [];
  if (Array.isArray(items)) return items;
  try { return JSON.parse(items); } catch { return []; }
}

function renderCurrentView() {
  const active = allOrders.filter(o => !['reglee','refusee'].includes(o.status || ''));
  document.getElementById('sideCountActive').textContent = active.length;
  document.getElementById('sideCountAll').textContent    = allOrders.length;

  document.getElementById('list-active').innerHTML = active.length
    ? `<div class="orders-grid">${active.map(renderCard).join('')}</div>`
    : `<div class="empty-state">🎉 Aucune commande active</div>`;

  document.getElementById('list-all').innerHTML = allOrders.length
    ? `<div class="orders-grid">${allOrders.map(renderCard).join('')}</div>`
    : `<div class="empty-state">Aucune commande dans la base</div>`;
}

function renderCard(o) {
  const items   = parseItems(o.items);
  const preview = items.slice(0,3).map(i=>`${i.name} ×${i.qty}`).join(', ') || '—';
  const status  = o.status || 'en_attente';
  return `
    <div class="order-card" onclick="openModal(${o.id})">
      <div class="oc-top-bar">
        <div class="oc-id">Commande <span>#${o.id}</span></div>
        <div class="oc-time">${o.created_at ? new Date(o.created_at).toLocaleTimeString('fr-FR') : '—'}</div>
      </div>
      <div class="oc-body">
        <div class="oc-customer">${o.first_name||''} ${o.last_name||''}</div>
        <div class="oc-delivery">${o.delivery_type==='livraison'?'🚴 Livraison':'🏪 Sur place'}</div>
        <div class="oc-items-list">${escHtml(preview)}</div>
        <div class="oc-total">${Number(o.total||0).toLocaleString('fr-FR')} DA</div>
      </div>
      <div class="oc-footer">
        <span class="status-badge status-${status}">${STATUS_LABELS[status]||status}</span>
        <span class="oc-chat-hint">💬 Discussion</span>
      </div>
    </div>`;
}

// ====================== MODAL ======================
async function openModal(orderId) {
  currentOrder = allOrders.find(o => o.id === orderId);
  if (!currentOrder) return;

  // Reset
  lastMsgIds.clear();
  switchModalTab('details', document.getElementById('tabBtnDetails'));
  document.getElementById('chatTabBadge').classList.remove('show');

  const items  = parseItems(currentOrder.items);
  const status = currentOrder.status || 'en_attente';

  document.getElementById('modalOrderId').innerHTML = `Commande <span>#${currentOrder.id}</span>`;
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-section">
      <div class="ms-title">Client</div>
      <div class="ms-info">
        <strong>${currentOrder.first_name||''} ${currentOrder.last_name||''}</strong><br>
        📞 ${currentOrder.phone||'—'}<br>
        ${currentOrder.discord_username ? `🎮 ${currentOrder.discord_username}` : ''}
      </div>
    </div>
    <div class="modal-section">
      <div class="ms-title">Récupération</div>
      <div class="ms-info">${currentOrder.delivery_type==='livraison'?'🚴 Livraison à domicile':'🏪 Sur place'}</div>
      ${currentOrder.address ? `<div class="ms-info" style="margin-top:6px;font-size:13px;color:rgba(255,255,255,.5)">📍 ${escHtml(currentOrder.address)}${currentOrder.zip_code?', '+currentOrder.zip_code:''}</div>` : ''}
      <div class="ms-title" style="margin-top:14px">Statut</div>
      <span class="status-badge status-${status}">${STATUS_LABELS[status]||status}</span>
    </div>
    <div class="modal-section full">
      <div class="ms-title">Articles</div>
      <table class="items-table">
        ${items.map(i=>`<tr><td>${escHtml(i.name)}</td><td style="color:rgba(255,255,255,.4)">×${i.qty}</td><td>${(Number(i.price)*Number(i.qty)).toLocaleString('fr-FR')} DA</td></tr>`).join('')}
      </table>
      <div style="margin-top:16px;text-align:right;font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold)">
        TOTAL : ${Number(currentOrder.total||0).toLocaleString('fr-FR')} DA
      </div>
    </div>`;

  const actions = {
    en_attente:   `<button class="btn btn-accept" onclick="doUpdate(${currentOrder.id},'acceptee')">✅ Accepter</button>
                   <button class="btn btn-refuse" onclick="doRefuse(${currentOrder.id})">❌ Refuser</button>`,
    acceptee:     `<button class="btn btn-prep"   onclick="doUpdate(${currentOrder.id},'preparation')">🍳 En préparation</button>`,
    preparation:  `<button class="btn btn-done"   onclick="doUpdate(${currentOrder.id},'finalisation')">🔍 Finalisation</button>`,
    finalisation: `<button class="btn btn-done"   onclick="doUpdate(${currentOrder.id},'termine')">✅ Terminée</button>`,
    termine:      `<button class="btn btn-paid"   onclick="doUpdate(${currentOrder.id},'reglee')">💰 Marquer payée</button>`,
  };
  document.getElementById('modalActions').innerHTML = actions[status]
    || `<span style="font-family:'Barlow Condensed',sans-serif;color:rgba(255,255,255,.3);font-size:13px;letter-spacing:1px">Aucune action disponible</span>`;

  await refreshChat(true);

  clearInterval(chatPollInterval);
  chatPollInterval = setInterval(() => refreshChat(false), 5000);

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  clearInterval(chatPollInterval);
  currentOrder = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function switchModalTab(tab, btn) {
  activeModalTab = tab;
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.modal-tab').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  btn.classList.add('active');

  if (tab === 'chat') {
    document.getElementById('chatTabBadge').classList.remove('show');
    const container = document.getElementById('chatMessages');
    setTimeout(() => container.scrollTop = container.scrollHeight, 50);
    document.getElementById('chatInput').focus();
  }
}

// ====================== ACTIONS ======================
async function doUpdate(id, status) {
  try {
    await sbPatch(id, { status });
    showToast(`✅ Statut → ${STATUS_LABELS[status]}`);
    closeModal();
    await loadAll();
  } catch(e) {
    showToast(`Erreur : ${e.message}`, 'error');
  }
}

async function doRefuse(id) {
  const reason = prompt('Motif du refus :');
  if (!reason?.trim()) return;
  try {
    await sbPatch(id, { status: 'refusee', refus_motif: reason });
    showToast('Commande refusée');
    closeModal();
    await loadAll();
  } catch(e) {
    showToast(`Erreur : ${e.message}`, 'error');
  }
}

// ====================== UI ======================
function showView(v) {
  document.getElementById('view-active').style.display = v === 'active' ? 'block' : 'none';
  document.getElementById('view-all').style.display    = v === 'all'    ? 'block' : 'none';
  document.getElementById('sideActive').classList.toggle('active', v === 'active');
  document.getElementById('sideAll').classList.toggle('active',    v === 'all');
}

function logout() { sessionStorage.removeItem('bs_user'); window.location.href = 'auth.html'; }

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type === 'error' ? 'error' : ''} show`;
  setTimeout(() => t.classList.remove('show'), 3500);
}

function spawnEmbers() {
  const bg     = document.getElementById('fireBg');
  const colors = ['#FF4500','#FF6200','#FF8C00','#FFB347'];
  setInterval(() => {
    const e = document.createElement('div');
    e.className = 'ember';
    e.style.left              = Math.random() * 100 + 'vw';
    const s                   = Math.random() * 5 + 2;
    e.style.width             = e.style.height = s + 'px';
    e.style.background        = colors[Math.floor(Math.random() * colors.length)];
    e.style.animationDuration = (Math.random() * 5 + 3) + 's';
    bg.appendChild(e);
    setTimeout(() => e.remove(), 8000);
  }, 150);
}

window.addEventListener('load', init);
</script>
